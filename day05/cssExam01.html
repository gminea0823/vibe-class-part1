<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        /*
        css선택자를 생성하고,내용을 입력합니다
        선택자에는 
            html tag (html 태그 전체 적용)
            tag id (id를 가진 태그에 적용,id 앞에 #을 붙임)
            class name (class이름이 적용된 태그에 적용 이름앞에 닷(.)을 붙임)
            tag 속성 (속성이 부합하는 태그에 적용)
        */


      div{
        width: 500px;
        height: 200px;
        background-color: blue;
        border: 1px solid red; /*두께 선모양 색깔*/
      }
      #div2{
        background-color: brown;
      }

      .pink{
        background-color: pink;
      }

      input[name='userid']{
        height: 90px;
      }
      }  
    </style>
</body>
    <div>div1</div>
    <div id="div2">div2</div>div>
    <div>div3</div>
    <div class="pink">div4</div>
    <div class="pink">div5</div>
    <div>
        <input type="text" name="userid" placeholder="아이디입력">
        <input type="password" name="password" placeholder="비밀번호입력">
    </div>
</html>
